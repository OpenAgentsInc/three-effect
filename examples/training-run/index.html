<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>three-effect Training Run</title>
    <style>
      :root {
        color-scheme: dark;
        background: #050505;
        color: #f5f5f5;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: #050505;
      }

      main {
        display: grid;
        min-height: 100vh;
        grid-template-rows: auto 1fr;
      }

      header {
        display: flex;
        flex-wrap: wrap;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid rgb(255 255 255 / 0.12);
        padding: 18px 22px;
      }

      h1 {
        margin: 0;
        font-size: clamp(24px, 4vw, 42px);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        max-width: 780px;
        margin: 8px 0 0;
        color: rgb(255 255 255 / 0.7);
        font-size: 15px;
        line-height: 1.5;
      }

      code {
        color: #fff;
      }

      .scene {
        min-height: 520px;
        height: calc(100vh - 118px);
      }

      @media (max-width: 720px) {
        header {
          padding: 16px;
        }

        .scene {
          min-height: 520px;
          height: calc(100vh - 180px);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Tassadar / Psion Training Run</h1>
          <p>
            Direct <code>three-effect</code> visual smoke for lifecycle,
            windows, Freivalds, receipts, promise registry, and operator command
            signals.
          </p>
        </div>
      </header>
      <div id="scene" class="scene"></div>
    </main>
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
